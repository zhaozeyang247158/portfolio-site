<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" fill="none">
  <!-- 米白纸张背景 -->
  <rect width="600" height="360" fill="#EDE8DC"/>
  <!-- 横纹 -->
  <line x1="0" y1="36" x2="600" y2="36" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="72" x2="600" y2="72" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="108" x2="600" y2="108" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="144" x2="600" y2="144" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="180" x2="600" y2="180" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="216" x2="600" y2="216" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="252" x2="600" y2="252" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="288" x2="600" y2="288" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="324" x2="600" y2="324" stroke="#C8C0B4" stroke-width="0.6"/>
  <!-- 手绘外边框 -->
  <path d="M32 24 Q34 22 568 20 Q572 22 570 336 Q568 340 32 338 Q28 336 30 24Z"
    stroke="#6B6560" stroke-width="1.4" stroke-dasharray="8 5" fill="none"/>

  <!-- ===== 左侧：业务问题气泡 ===== -->
  <!-- 人物轮廓 -->
  <circle cx="90" cy="145" r="16" stroke="#2C2C2C" stroke-width="1.8" fill="none"/>
  <path d="M62 195 Q62 175 90 175 Q118 175 118 195" stroke="#2C2C2C" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 对话气泡 -->
  <path d="M108 108 Q112 96 160 96 Q194 96 194 118 Q194 140 160 140 Q148 140 140 136 L128 148 L132 136 Q108 134 108 118 Z"
    stroke="#2C2C2C" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
  <!-- 气泡里的问题文字 -->
  <text x="151" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#2C2C2C">哪些 SKU</text>
  <text x="151" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#2C2C2C">卖得最好？</text>
  <!-- 标签 -->
  <text x="90" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B6560">业务问题</text>

  <!-- ===== 第一箭头 ===== -->
  <path d="M200 168 Q218 168 232 168" stroke="#2C2C2C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-dasharray="4 3"/>
  <path d="M228 163 L238 168 L228 173" stroke="#2C2C2C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 中间：SQL/Python 代码块 ===== -->
  <!-- 代码卡片 -->
  <rect x="248" y="110" width="148" height="115" rx="4" stroke="#2C2C2C" stroke-width="1.7" fill="none"/>
  <!-- 代码卡片标题栏 -->
  <line x1="248" y1="128" x2="396" y2="128" stroke="#2C2C2C" stroke-width="1.2"/>
  <!-- 三个小圆点（窗口装饰） -->
  <circle cx="262" cy="119" r="3.5" stroke="#2C2C2C" stroke-width="1.3" fill="none"/>
  <circle cx="274" cy="119" r="3.5" stroke="#2C2C2C" stroke-width="1.3" fill="none"/>
  <circle cx="286" cy="119" r="3.5" stroke="#2C2C2C" stroke-width="1.3" fill="none"/>
  <!-- 代码行 -->
  <text x="258" y="145" font-family="'Courier New', monospace" font-size="8.5" fill="#2C2C2C">SELECT sku_name,</text>
  <text x="258" y="158" font-family="'Courier New', monospace" font-size="8.5" fill="#2C2C2C">  SUM(sales) AS total</text>
  <text x="258" y="171" font-family="'Courier New', monospace" font-size="8.5" fill="#2C2C2C">FROM orders</text>
  <text x="258" y="184" font-family="'Courier New', monospace" font-size="8.5" fill="#6B6560">GROUP BY sku_name</text>
  <text x="258" y="197" font-family="'Courier New', monospace" font-size="8.5" fill="#6B6560">ORDER BY total DESC</text>
  <text x="258" y="210" font-family="'Courier New', monospace" font-size="8.5" fill="#A8A09A">LIMIT 10;</text>
  <!-- 标签 -->
  <text x="322" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B6560">SQL / Python 分析</text>

  <!-- ===== 第二箭头 ===== -->
  <path d="M402 168 Q418 168 432 168" stroke="#2C2C2C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-dasharray="4 3"/>
  <path d="M428 163 L438 168 L428 173" stroke="#2C2C2C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 右侧：经营诊断报告 ===== -->
  <!-- 报告纸张 -->
  <rect x="448" y="96" width="110" height="140" rx="3" stroke="#2C2C2C" stroke-width="1.7" fill="none"/>
  <!-- 报告顶部折角 -->
  <path d="M536 96 L558 96 L558 116 Z" stroke="#2C2C2C" stroke-width="1.4" fill="none"/>
  <!-- 报告标题线 -->
  <line x1="460" y1="118" x2="532" y2="118" stroke="#2C2C2C" stroke-width="1.5"/>
  <!-- 报告内容行 -->
  <line x1="460" y1="132" x2="546" y2="132" stroke="#2C2C2C" stroke-width="1.0" stroke-dasharray="3 2"/>
  <line x1="460" y1="143" x2="546" y2="143" stroke="#2C2C2C" stroke-width="1.0" stroke-dasharray="3 2"/>
  <!-- 小柱状图 -->
  <rect x="460" y="175" width="14" height="40" stroke="#2C2C2C" stroke-width="1.4" fill="none"/>
  <rect x="480" y="188" width="14" height="27" stroke="#2C2C2C" stroke-width="1.4" fill="none"/>
  <rect x="500" y="165" width="14" height="50" stroke="#2C2C2C" stroke-width="1.4" fill="none"/>
  <rect x="520" y="181" width="14" height="34" stroke="#2C2C2C" stroke-width="1.4" fill="none"/>
  <!-- 动作建议标注 -->
  <path d="M460 156 L546 156" stroke="#2C2C2C" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="460" y="153" font-family="Georgia, serif" font-size="7.5" fill="#2C2C2C">▸ 补货预警 3 SKU</text>
  <!-- 标签 -->
  <text x="503" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B6560">经营诊断报告</text>

  <!-- ===== 底部标注 ===== -->
  <text x="300" y="296" text-anchor="middle"
    font-family="'Ma Shan Zheng', Georgia, serif" font-size="12" fill="#2C2C2C" letter-spacing="1">
    业务问题 → SQL/Python 分析 → 经营诊断报告
  </text>
  <!-- 版本小标 -->
  <text x="300" y="316" text-anchor="middle"
    font-family="Georgia, serif" font-size="9" fill="#A8A09A" letter-spacing="2">
    V0.7 · Streamlit · DuckDB · 采销训练工具
  </text>

  <!-- ===== 左上角小装饰：铅笔 ===== -->
  <path d="M42 42 L54 30 L60 36 L48 48 Z" stroke="#2C2C2C" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
  <path d="M42 42 L46 46 L44 52 Z" stroke="#2C2C2C" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
  <line x1="54" y1="30" x2="58" y2="26" stroke="#2C2C2C" stroke-width="1.4" stroke-linecap="round"/>

  <!-- ===== 右上角小装饰：数据库圆柱 ===== -->
  <ellipse cx="548" cy="52" rx="16" ry="5" stroke="#2C2C2C" stroke-width="1.4" fill="none"/>
  <line x1="532" y1="52" x2="532" y2="70" stroke="#2C2C2C" stroke-width="1.4"/>
  <line x1="564" y1="52" x2="564" y2="70" stroke="#2C2C2C" stroke-width="1.4"/>
  <path d="M532 70 Q548 75 564 70" stroke="#2C2C2C" stroke-width="1.4" fill="none"/>
</svg>
