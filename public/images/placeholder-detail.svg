<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#EDE8DC"/>
  <!-- 横纹 -->
  <line x1="0" y1="50"  x2="800" y2="50"  stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#C8C0B4" stroke-width="0.6"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#C8C0B4" stroke-width="0.6"/>
  <!-- 手绘外框 -->
  <path d="M40 30 Q42 28 758 26 Q762 28 760 472 Q758 476 40 474 Q36 472 38 30Z"
    stroke="#6B6560" stroke-width="1.4" stroke-dasharray="10 6" fill="none"/>
  <!-- 电脑屏幕 doodle -->
  <rect x="260" y="140" width="280" height="185" rx="8"
    stroke="#2C2C2C" stroke-width="2" fill="none"/>
  <!-- 屏幕内容线 -->
  <line x1="280" y1="172" x2="520" y2="172" stroke="#B0A898" stroke-width="1" stroke-dasharray="8 5"/>
  <line x1="280" y1="202" x2="480" y2="202" stroke="#B0A898" stroke-width="1" stroke-dasharray="8 5"/>
  <line x1="280" y1="232" x2="510" y2="232" stroke="#B0A898" stroke-width="1" stroke-dasharray="8 5"/>
  <line x1="280" y1="262" x2="460" y2="262" stroke="#B0A898" stroke-width="1" stroke-dasharray="8 5"/>
  <line x1="280" y1="292" x2="490" y2="292" stroke="#B0A898" stroke-width="1" stroke-dasharray="8 5"/>
  <!-- 光标 -->
  <rect x="280" y="158" width="8" height="14" fill="#2C2C2C" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- 支架 -->
  <line x1="370" y1="325" x2="370" y2="360" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <line x1="430" y1="325" x2="430" y2="360" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <line x1="330" y1="360" x2="470" y2="360" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <!-- 侧边标注箭头 -->
  <path d="M560 232 Q590 232 610 232 L604 226 M610 232 L604 238"
    stroke="#6B6560" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <text x="618" y="236" font-family="'Ma Shan Zheng',Georgia,serif" font-size="11"
    fill="#8B7355" letter-spacing="1">详情图</text>
  <!-- 底部标注 -->
  <text x="400" y="450" text-anchor="middle"
    font-family="'Ma Shan Zheng', Georgia, serif" font-size="13" fill="#A8A09A" letter-spacing="3">
    详情截图 · 待替换
  </text>
</svg>
